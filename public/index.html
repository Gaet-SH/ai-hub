<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Hub — Claude · GPT · Gemini</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e2e;
    --muted:    #3a3a55;
    --text:     #e2e2f0;
    --subtle:   #6e6e9a;

    --claude:   #e8805a;
    --gpt:      #19c37d;
    --gemini:   #4285f4;

    --claude-dim: rgba(232,128,90,.12);
    --gpt-dim:    rgba(25,195,125,.12);
    --gemini-dim: rgba(66,133,244,.12);

    --radius: 10px;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

  /* ── layout ───────────────────────────────── */
  .app { display: grid; grid-template-rows: auto 1fr auto; height: 100vh; }

  /* ── header ──────────────────────────────── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: relative; z-index: 10;
  }
  .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: .05em; display:flex; gap:10px; align-items:center; }
  .logo-dot { width:8px; height:8px; border-radius:50%; animation: pulse 2s infinite; }
  .logo-dot.c { background: var(--claude); }
  .logo-dot.g { background: var(--gpt); animation-delay:.3s; }
  .logo-dot.m { background: var(--gemini); animation-delay:.6s; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .model-selectors { display: flex; gap: 10px; }
  .model-select {
    font-family: var(--mono); font-size: .68rem;
    background: var(--bg); color: var(--subtle);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 8px; cursor: pointer; transition: color .2s, border-color .2s;
    appearance: none; -webkit-appearance: none;
  }
  .model-select.active-claude { color: var(--claude); border-color: var(--claude); }
  .model-select.active-gpt    { color: var(--gpt);    border-color: var(--gpt); }
  .model-select.active-gemini { color: var(--gemini); border-color: var(--gemini); }

  /* ── toggle pills ────────────────────────── */
  .toggles { display: flex; gap: 6px; align-items: center; }
  .toggle-pill {
    font-family: var(--mono); font-size: .7rem; font-weight: 700;
    padding: 5px 12px; border-radius: 20px; cursor: pointer;
    border: 1.5px solid transparent; transition: all .18s;
    user-select: none;
  }
  .toggle-pill.claude { border-color: var(--claude); color: var(--claude); background: transparent; }
  .toggle-pill.gpt    { border-color: var(--gpt);    color: var(--gpt);    background: transparent; }
  .toggle-pill.gemini { border-color: var(--gemini); color: var(--gemini); background: transparent; }
  .toggle-pill.active.claude { background: var(--claude-dim); }
  .toggle-pill.active.gpt    { background: var(--gpt-dim); }
  .toggle-pill.active.gemini { background: var(--gemini-dim); }
  .toggle-pill.inactive { opacity: .35; }

  /* ── chat area ───────────────────────────── */
  .chat-area {
    display: grid; grid-template-columns: 1fr; overflow: hidden;
    transition: grid-template-columns .3s ease;
  }
  .chat-area.cols-2 { grid-template-columns: 1fr 1fr; }
  .chat-area.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .panel {
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden; position: relative;
    transition: opacity .2s;
  }
  .panel:last-child { border-right: none; }
  .panel.hidden { display: none; }

  .panel-header {
    padding: 10px 16px; display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: .72rem; font-weight: 700; letter-spacing:.06em;
    position: sticky; top: 0; z-index: 2;
  }
  .panel.claude .panel-header { color: var(--claude); background: var(--claude-dim); }
  .panel.gpt    .panel-header { color: var(--gpt);    background: var(--gpt-dim); }
  .panel.gemini .panel-header { color: var(--gemini); background: var(--gemini-dim); }

  .panel-icon { font-size: 1rem; }
  .status-dot { width:6px; height:6px; border-radius:50%; background: var(--muted); margin-left:auto; transition: background .3s; }
  .status-dot.thinking { background: currentColor; animation: blink .7s infinite; }
  .status-dot.done     { background: currentColor; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  .messages {
    flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; }

  .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeUp .2s ease; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }

  .msg-role {
    font-family: var(--mono); font-size: .62rem; letter-spacing:.08em; color: var(--subtle);
    text-transform: uppercase;
  }
  .msg-content {
    font-size: .88rem; line-height: 1.65; color: var(--text); white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-content {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    color: var(--subtle);
  }

  /* code blocks */
  .msg-content code {
    font-family: var(--mono); font-size: .8em;
    background: var(--border); padding: 1px 5px; border-radius: 3px;
  }
  .msg-content pre {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; overflow-x: auto; margin: 8px 0;
  }
  .msg-content pre code { background: none; padding: 0; }

  .copy-btn {
    font-family: var(--mono); font-size: .62rem; color: var(--subtle);
    background: none; border: 1px solid var(--border); border-radius: 4px;
    padding: 2px 7px; cursor: pointer; align-self: flex-start;
    transition: color .15s, border-color .15s;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--muted); }

  /* ── input bar ───────────────────────────── */
  .input-bar {
    border-top: 1px solid var(--border); background: var(--surface);
    padding: 14px 20px; display: flex; gap: 12px; align-items: flex-end;
  }
  .input-wrap { flex: 1; position: relative; }
  textarea {
    width: 100%; resize: none; min-height: 44px; max-height: 160px;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 11px 14px; font-family: var(--sans); font-size: .9rem; line-height: 1.5;
    outline: none; transition: border-color .2s;
    scrollbar-width: none;
  }
  textarea:focus { border-color: var(--muted); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    height: 44px; min-width: 90px; border: none; border-radius: var(--radius);
    background: linear-gradient(135deg, var(--claude) 0%, var(--gemini) 100%);
    color: #fff; font-family: var(--sans); font-size: .85rem; font-weight: 700;
    cursor: pointer; transition: opacity .15s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    letter-spacing: .04em;
  }
  .send-btn:hover { opacity: .88; }
  .send-btn:active { transform: scale(.97); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .bottom-actions { display: flex; gap: 8px; align-items: center; }
  .clear-btn {
    font-family: var(--mono); font-size: .68rem; color: var(--muted);
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 5px 10px; cursor: pointer; transition: color .15s, border-color .15s;
    height: 32px;
  }
  .clear-btn:hover { color: var(--text); border-color: var(--muted); }

  /* ── empty state ────────────────────────── */
  .empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; color: var(--muted); font-family: var(--mono); font-size: .75rem;
    text-align: center; padding: 24px;
  }
  .empty-icon { font-size: 1.8rem; opacity: .4; }

  /* ── toast ──────────────────────────────── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: .72rem;
    padding: 8px 16px; border-radius: 20px;
    opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── compare mode ────────────────────────── */
  .compare-badge {
    font-family: var(--mono); font-size: .65rem; color: var(--subtle);
    background: var(--bg); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 4px;
  }

  @media (max-width: 640px) {
    .chat-area.cols-2, .chat-area.cols-3 { grid-template-columns: 1fr; }
    .model-selectors { display: none; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <span class="logo-dot c"></span>
      <span class="logo-dot g"></span>
      <span class="logo-dot m"></span>
      AI HUB
    </div>

    <div class="toggles">
      <span class="compare-badge" id="compareBadge">COMPARE</span>
      <div class="toggle-pill claude active" data-ai="claude" onclick="toggleAI('claude')">Claude</div>
      <div class="toggle-pill gpt active" data-ai="gpt" onclick="toggleAI('gpt')">GPT</div>
      <div class="toggle-pill gemini active" data-ai="gemini" onclick="toggleAI('gemini')">Gemini</div>
    </div>

    <div class="model-selectors">
      <select class="model-select active-claude" id="claudeModel">
        <option value="claude-opus-4-5">claude-opus-4-5</option>
        <option value="claude-sonnet-4-5">claude-sonnet-4-5</option>
        <option value="claude-haiku-4-5-20251001">claude-haiku-4-5</option>
      </select>
      <select class="model-select active-gpt" id="gptModel">
        <option value="gpt-4o">gpt-4o</option>
        <option value="gpt-4o-mini">gpt-4o-mini</option>
        <option value="gpt-4-turbo">gpt-4-turbo</option>
      </select>
      <select class="model-select active-gemini" id="geminiModel">
        <option value="gemini-1.5-pro">gemini-1.5-pro</option>
        <option value="gemini-1.5-flash">gemini-1.5-flash</option>
        <option value="gemini-2.0-flash">gemini-2.0-flash</option>
      </select>
    </div>
  </header>

  <!-- Chat panels -->
  <div class="chat-area cols-3" id="chatArea">

    <!-- Claude -->
    <div class="panel claude" id="panel-claude">
      <div class="panel-header">
        <span class="panel-icon">◆</span> CLAUDE
        <span class="status-dot" id="status-claude"></span>
      </div>
      <div class="messages" id="msgs-claude">
        <div class="empty"><div class="empty-icon">◆</div><span>En attente...</span></div>
      </div>
    </div>

    <!-- GPT -->
    <div class="panel gpt" id="panel-gpt">
      <div class="panel-header">
        <span class="panel-icon">●</span> GPT
        <span class="status-dot" id="status-gpt"></span>
      </div>
      <div class="messages" id="msgs-gpt">
        <div class="empty"><div class="empty-icon">●</div><span>En attente...</span></div>
      </div>
    </div>

    <!-- Gemini -->
    <div class="panel gemini" id="panel-gemini">
      <div class="panel-header">
        <span class="panel-icon">✦</span> GEMINI
        <span class="status-dot" id="status-gemini"></span>
      </div>
      <div class="messages" id="msgs-gemini">
        <div class="empty"><div class="empty-icon">✦</div><span>En attente...</span></div>
      </div>
    </div>

  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <div style="display:flex; flex-direction:column; gap:8px; flex:1;">
      <textarea id="promptInput" rows="1" placeholder="Pose ta question aux 3 IA en même temps…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    </div>
    <div class="bottom-actions">
      <button class="clear-btn" onclick="clearAll()" title="Effacer l'historique">↺ clear</button>
      <button class="send-btn" id="sendBtn" onclick="sendAll()">
        <span>Envoyer</span> ↗
      </button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const state = {
  active: { claude: true, gpt: true, gemini: true },
  history: { claude: [], gpt: [], gemini: [] },
  busy: false,
};

const AI = {
  claude:  { endpoint: '/api/claude',  modelId: 'claudeModel' },
  gpt:     { endpoint: '/api/gpt',     modelId: 'gptModel' },
  gemini:  { endpoint: '/api/gemini',  modelId: 'geminiModel' },
};

// ── Toggle panels ──────────────────────────────────────────────────────────
function toggleAI(id) {
  const count = Object.values(state.active).filter(Boolean).length;
  if (state.active[id] && count === 1) { showToast("Au moins un modèle doit rester actif"); return; }

  state.active[id] = !state.active[id];

  document.getElementById(`panel-${id}`).classList.toggle('hidden', !state.active[id]);
  const pill = document.querySelector(`.toggle-pill.${id}`);
  pill.classList.toggle('active', state.active[id]);
  pill.classList.toggle('inactive', !state.active[id]);

  updateLayout();
}

function updateLayout() {
  const n = Object.values(state.active).filter(Boolean).length;
  const area = document.getElementById('chatArea');
  area.className = `chat-area cols-${n}`;
}

// ── Send to all active AIs ─────────────────────────────────────────────────
async function sendAll() {
  const input = document.getElementById('promptInput');
  const text = input.value.trim();
  if (!text || state.busy) return;

  state.busy = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  autoResize(input);

  // Append user message to history & UI
  const activeAIs = Object.keys(state.active).filter(k => state.active[k]);
  for (const id of activeAIs) {
    state.history[id].push({ role: 'user', content: text });
    appendMessage(id, 'user', text);
  }

  // Fire all active AIs in parallel
  await Promise.all(activeAIs.map(id => streamResponse(id, text)));

  state.busy = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

async function streamResponse(id, userText) {
  const model = document.getElementById(AI[id].modelId).value;
  const statusDot = document.getElementById(`status-${id}`);
  statusDot.className = 'status-dot thinking';

  const msgEl = appendMessage(id, 'assistant', '');
  const contentEl = msgEl.querySelector('.msg-content');

  try {
    const resp = await fetch(AI[id].endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: state.history[id], model }),
    });

    if (!resp.ok) { throw new Error(`HTTP ${resp.status}`); }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const { text } = JSON.parse(raw);
          fullText += text;
          contentEl.textContent = fullText;
          scrollToBottom(id);
        } catch {}
      }
    }

    state.history[id].push({ role: 'assistant', content: fullText });
    statusDot.className = 'status-dot done';

    // Add copy button
    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = 'copier';
    copyBtn.onclick = () => { navigator.clipboard.writeText(fullText); showToast('Copié !'); };
    msgEl.appendChild(copyBtn);

  } catch (err) {
    contentEl.textContent = `⚠ Erreur : ${err.message}`;
    contentEl.style.color = '#e85a5a';
    statusDot.className = 'status-dot';
  }
}

// ── UI helpers ─────────────────────────────────────────────────────────────
function appendMessage(id, role, text) {
  const container = document.getElementById(`msgs-${id}`);

  // Remove empty state
  const empty = container.querySelector('.empty');
  if (empty) empty.remove();

  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const roleEl = document.createElement('div');
  roleEl.className = 'msg-role';
  roleEl.textContent = role === 'user' ? 'vous' : id;

  const contentEl = document.createElement('div');
  contentEl.className = 'msg-content';
  contentEl.textContent = text;

  wrap.appendChild(roleEl);
  wrap.appendChild(contentEl);
  container.appendChild(wrap);
  scrollToBottom(id);
  return wrap;
}

function scrollToBottom(id) {
  const el = document.getElementById(`msgs-${id}`);
  el.scrollTop = el.scrollHeight;
}

function clearAll() {
  ['claude', 'gpt', 'gemini'].forEach(id => {
    state.history[id] = [];
    const container = document.getElementById(`msgs-${id}`);
    const icons = { claude: '◆', gpt: '●', gemini: '✦' };
    container.innerHTML = `<div class="empty"><div class="empty-icon">${icons[id]}</div><span>En attente...</span></div>`;
    document.getElementById(`status-${id}`).className = 'status-dot';
  });
  showToast('Historique effacé');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAll(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
</script>
</body>
</html>
